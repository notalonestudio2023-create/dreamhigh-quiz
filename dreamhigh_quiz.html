<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小一新鮮人測驗 ｜ 心夢想教育</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #E8A020;
    --gold-dark: #C4861A;
    --gold-light: #FFF8E8;
    --gold-mid: #FAD98A;
    --gold-border: #F0D49A;
    --bg: #FFFDF5;
    --white: #FFFFFF;
    --text: #2C2218;
    --muted: #7A6A50;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --radius: 16px;
  }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .quiz-wrap { max-width: 600px; margin: 0 auto; padding-bottom: 3rem; }

  /* ── HERO ── */
  .hero {
    background: var(--white);
    border-bottom: 2px solid var(--gold-border);
    padding: 1.5rem 1.5rem 1.25rem;
    text-align: center;
  }
  .logo-img { height: 80px; width: 80px; border-radius: 16px; display: block; margin: 0 auto 10px; object-fit: cover; }
  .hero-divider { width: 36px; height: 2px; background: var(--gold); margin: 0 auto 12px; }
  .hero-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--white);
    font-size: 12px; font-weight: 700;
    padding: 4px 14px; border-radius: 20px;
    margin-bottom: 10px; letter-spacing: 0.5px;
  }
  .hero-title { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
  .hero-sub { font-size: 13px; color: var(--muted); line-height: 1.7; }

  /* ── INTRO PAGE ── */
  .intro-box {
    background: var(--white);
    border: 1px solid var(--gold-border);
    border-radius: var(--radius);
    margin: 1.25rem 1rem 0;
    padding: 1.5rem;
  }
  .intro-box h2 { font-size: 16px; font-weight: 700; color: var(--gold-dark); margin-bottom: 12px; }
  .intro-box p { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 10px; }
  .intro-box ul { padding-left: 1.2rem; }
  .intro-box ul li { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .intro-score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .score-pill {
    background: var(--gold-light);
    border: 1px solid var(--gold-border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px; color: var(--gold-dark); line-height: 1.5;
  }
  .score-pill strong { display: block; font-size: 13px; color: var(--text); font-weight: 700; }

  .form-section { margin: 1.25rem 1rem 0; }
  .form-section label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  .form-section input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--gold-border);
    border-radius: 10px;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--text); background: var(--white);
    margin-bottom: 12px; outline: none;
    transition: border-color 0.15s;
  }
  .form-section input:focus { border-color: var(--gold); }
  .form-section .req { color: var(--gold); margin-left: 2px; }

  /* ── PROGRESS ── */
  .progress-wrap { padding: 1rem 1.25rem 0; }
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-step { font-size: 12px; font-weight: 700; color: var(--gold-dark); }
  .progress-pct { font-size: 11px; color: var(--muted); }
  .progress-track { background: var(--gold-border); height: 6px; border-radius: 3px; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; }

  /* ── SECTION LABEL ── */
  .section-label { display: flex; align-items: center; gap: 8px; margin: 1.25rem 1.25rem 0.5rem; }
  .section-pip { width: 3px; height: 16px; border-radius: 2px; background: var(--gold); }
  .section-text { font-size: 11px; font-weight: 700; color: var(--gold-dark); letter-spacing: 0.5px; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--white);
    border-radius: var(--radius);
    margin: 0 1rem 0.75rem;
    border: 1px solid var(--gold-border);
    overflow: hidden;
  }
  .q-header {
    background: var(--gold-light);
    padding: 10px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    border-bottom: 1px solid var(--gold-border);
  }
  .q-num-badge {
    flex-shrink: 0; width: 26px; height: 26px;
    border-radius: 8px; background: var(--gold);
    color: var(--white); font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .q-text { font-size: 14px; color: var(--text); font-weight: 500; line-height: 1.6; }
  .q-body { padding: 12px; }
  .options { display: flex; flex-direction: column; gap: 7px; }
  .option {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg); border: 1.5px solid var(--gold-border);
    border-radius: 10px; padding: 9px 12px; cursor: pointer;
    transition: all 0.15s; font-size: 13px; color: var(--text); line-height: 1.55;
    user-select: none;
  }
  .option:hover { border-color: var(--gold); background: var(--gold-light); }
  .option.selected { border-color: var(--gold); background: var(--gold-light); }
  .opt-key {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px;
    background: var(--gold-border); color: var(--gold-dark);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .option.selected .opt-key { background: var(--gold); color: var(--white); }

  /* ── ANSWER STATUS ── */
  .answer-status {
    margin: 0 1rem 0.5rem;
    padding: 8px 12px;
    background: var(--green-bg);
    border-radius: 10px;
    font-size: 12px; color: #0A5C3E;
    display: flex; gap: 6px; align-items: center;
  }

  /* ── NAV ── */
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin: 1rem 1rem 0; gap: 10px; }
  .btn-prev {
    background: var(--white); color: var(--gold-dark);
    border: 1.5px solid var(--gold-border);
    border-radius: 50px; padding: 11px 22px;
    font-size: 14px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
  }
  .btn-prev:hover { border-color: var(--gold); }
  .btn-main {
    background: var(--gold); color: var(--white);
    border: none; border-radius: 50px; padding: 12px 32px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
    flex: 1;
  }
  .btn-main:hover { background: var(--gold-dark); }
  .btn-main:disabled { background: var(--gold-border); color: var(--white); cursor: not-allowed; }

  /* ── RESULT ── */
  .result-wrap { padding: 0 1rem; }
  .score-ring {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--gold-light);
    border: 3px solid var(--gold);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 1.5rem auto 1rem;
  }
  .score-num { font-size: 32px; font-weight: 700; color: var(--gold-dark); line-height: 1; }
  .score-denom { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .result-card {
    background: var(--white); border-radius: var(--radius);
    border: 1px solid var(--gold-border); padding: 1.5rem; margin-bottom: 1rem;
  }
  .result-badge {
    display: inline-block; background: var(--gold); color: var(--white);
    font-size: 12px; font-weight: 700; padding: 4px 16px;
    border-radius: 20px; margin-bottom: 10px;
  }
  .result-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
  .result-desc { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 14px; }
  .courses-box { background: var(--gold-light); border-radius: 10px; padding: 12px 14px; }
  .courses-title { font-size: 12px; font-weight: 700; color: var(--gold-dark); margin-bottom: 8px; }
  .course-tag {
    display: inline-block; background: var(--white); color: var(--gold-dark);
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; margin: 2px 3px 2px 0;
    border: 1px solid var(--gold-border);
  }
  .tips-box { background: var(--green-bg); border-radius: 10px; padding: 12px 14px; margin-top: 10px; }
  .tips-title { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
  .tips-box li { font-size: 12px; color: #0A5C3E; line-height: 1.8; padding-left: 0.25rem; }
  .cta-btn {
    width: 100%; margin-top: 1rem;
    background: var(--gold); color: var(--white);
    border: none; border-radius: 50px; padding: 14px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer; letter-spacing: 1px;
  }
  .cta-btn:hover { background: var(--gold-dark); }

  .hidden { display: none !important; }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; font-size: 13px; padding: 10px 20px;
    border-radius: 50px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>

// ── STATE ──
let currentQ = 0;
let answers = new Array(10).fill(null); // answers[i] = score (1-4)
let answerKeys = new Array(10).fill(null); // selected option key
let parentName = "", phone = "", childName = "", childAge = "";

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function startQuiz() {
  parentName = document.getElementById('inp-parent').value.trim();
  phone = document.getElementById('inp-phone').value.trim();
  childName = document.getElementById('inp-child').value.trim();
  childAge = document.getElementById('inp-age').value.trim();
  if (!parentName || !phone || !childName) {
    showToast('請填寫必填欄位（家長姓名、聯絡電話、孩子姓名）');
    return;
  }
  document.getElementById('page-intro').classList.add('hidden');
  document.getElementById('page-quiz').classList.remove('hidden');
  renderQ(0);
}

function renderQ(idx) {
  currentQ = idx;
  const q = QUESTIONS[idx];
  document.getElementById('prog-label').textContent = '第 ' + (idx+1) + ' 題 / 共 10 題';
  const pct = Math.round(idx / 10 * 100);
  document.getElementById('prog-pct').textContent = pct + '% 完成';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('section-text').textContent = q.section;
  document.getElementById('q-num').textContent = idx + 1;
  document.getElementById('q-text').textContent = q.text;

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  q.options.forEach((opt) => {
    const div = document.createElement('div');
    div.className = 'option' + (answerKeys[idx] === opt.key ? ' selected' : '');
    div.innerHTML = '<div class="opt-key">' + opt.key + '</div><span>' + opt.text + '</span>';
    div.onclick = () => selectOption(idx, opt.key, opt.score);
    optList.appendChild(div);
  });

  // answered count status
  const done = answers.filter(a => a !== null).length;
  const status = document.getElementById('answer-status');
  if (done > 0 && idx > 0) {
    status.style.display = 'flex';
    status.innerHTML = '✅ 已完成 ' + done + ' 題';
  } else {
    status.style.display = 'none';
  }

  document.getElementById('btn-prev').style.display = idx > 0 ? 'block' : 'none';
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = idx < 9 ? '下一題 →' : '查看結果 →';
  btnNext.disabled = false;
}

function selectOption(idx, key, score) {
  answers[idx] = score;
  answerKeys[idx] = key;
  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function prevQ() { if (currentQ > 0) renderQ(currentQ - 1); }

function nextQ() {
  if (answers[currentQ] === null) {
    showToast('請先選擇一個選項再繼續');
    return;
  }
  if (currentQ < 9) {
    renderQ(currentQ + 1);
  } else {
    showResult();
  }
}

function showResult() {
  const unanswered = answers.filter(a => a === null).length;
  if (unanswered > 0) {
    showToast('還有 ' + unanswered + ' 題未作答，請返回完成');
    return;
  }
  const total = answers.reduce((s, v) => s + v, 0);
  const res = RESULTS.find(r => total >= r.range[0] && total <= r.range[1]);

  document.getElementById('page-quiz').classList.add('hidden');
  document.getElementById('page-result').classList.remove('hidden');
  document.getElementById('res-score').textContent = total;
  document.getElementById('res-badge').textContent = res.emoji + ' ' + res.type;
  document.getElementById('res-title').textContent = res.title;
  document.getElementById('res-desc').textContent = res.desc;

  const coursesEl = document.getElementById('res-courses');
  coursesEl.innerHTML = res.courses.map(c => '<span class="course-tag">' + c + '</span>').join('');

  const tipsEl = document.getElementById('res-tips');
  tipsEl.innerHTML = res.tips.map(t => '<li>' + t + '</li>').join('');

  // Submit to Google Sheets
  submitToSheet(total, res.type);
}

// ── GOOGLE SHEETS SUBMIT ──
// 👉 請將下方 SHEET_URL 換成您的 Google Apps Script 網址
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxrqp03JeyigQZIijSq9XMXmMQ3BKk2yJ2SpejbMRvjoltDo_4-sFUDv34DJCXF6kDEDw/exec';

function submitToSheet(total, resultType) {
  const payload = {
    timestamp: new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'}),
    parentName,
    phone,
    childName,
    childAge,
    q1: answerKeys[0], q2: answerKeys[1], q3: answerKeys[2],
    q4: answerKeys[3], q5: answerKeys[4], q6: answerKeys[5],
    q7: answerKeys[6], q8: answerKeys[7], q9: answerKeys[8],
    q10: answerKeys[9],
    totalScore: total,
    resultType
  };
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {});
}
